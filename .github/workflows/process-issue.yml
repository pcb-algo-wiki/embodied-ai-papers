name: Process Paper Issue

on:
  issues:
    types: [opened, reopened]
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  process-paper:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.body, 'arxiv.org')
    steps:
      - name: Debug
        run: |
          echo "Issue: ${{ github.event.issue.number }}"
          echo "Has arxiv: ${{ contains(github.event.issue.body, 'arxiv.org') }}"
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install feedparser

      - name: Extract paper info
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: python .github/scripts/extract_paper.py "$ISSUE_BODY"

      - name: Create paper note
        env:
          ISSUE_NUM: ${{ github.event.issue.number }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
        run: |
          python .github/scripts/create_note.py \
            --issue-number "$ISSUE_NUM" \
            --issue-url "$ISSUE_URL"

      - name: Commit and push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          git diff --staged --quiet || git commit -m "feat: process issue #${{ github.event.issue.number }}"
          git push

      - name: Comment on issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUM: ${{ github.event.issue.number }}
        run: |
          gh issue comment "$ISSUE_NUM" \
            --repo "${{ github.repository }}" \
            --body "✅ **论文已解析完成！**"
