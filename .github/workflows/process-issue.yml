name: Process Paper Issue

on:
  issues:
    types: [opened, reopened]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

env:
  ISSUE_NUM: ${{ github.event.issue.number }}
  ISSUE_URL: ${{ github.event.issue.html_url }}
  ISSUE_BODY: ${{ github.event.issue.body }}

jobs:
  process-paper:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.body, 'arxiv.org')
    steps:
      - name: Debug info
        run: |
          echo "Issue: ${{ env.ISSUE_NUM }}"
          echo "URL: ${{ env.ISSUE_URL }}"
          echo "Repo: ${{ github.repository }}"

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install feedparser

      - name: Extract paper info
        run: python .github/scripts/extract_paper.py "${{ env.ISSUE_BODY }}"

      - name: Create paper note
        run: |
          python .github/scripts/create_note.py \
            --issue-number "${{ env.ISSUE_NUM }}" \
            --issue-url "${{ env.ISSUE_URL }}"

      - name: Read paper metadata
        id: meta
        run: |
          pip install jq 2>/dev/null || true
          echo "arxiv_id=$(python3 -c \"import json; d=json.load(open('paper_meta.json')); print(d.get('arxiv_id',''))\")" >> $GITHUB_OUTPUT
          echo "title=$(python3 -c \"import json; d=json.load(open('paper_meta.json')); print(d.get('title','')[:60])\")" >> $GITHUB_OUTPUT

      - name: Create new branch and commit
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          BRANCH="paper/${{ steps.meta.outputs.arxiv_id }}"
          git checkout -b "$BRANCH"
          git add papers/ index.md log.md 2>/dev/null || true
          git add .
          git diff --staged --quiet && echo "No changes to commit" && exit 1
          git commit -m "feat: add paper ${{ steps.meta.outputs.arxiv_id }} - ${{ steps.meta.outputs.title }}"
          git push -u origin "$BRANCH" -f
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_URL=$(gh pr create \
            --repo "${{ github.repository }}" \
            --title "[Paper] ${{ steps.meta.outputs.title }}" \
            --body "## Paper: ${{ steps.meta.outputs.title }}

**arXiv:** https://arxiv.org/abs/${{ steps.meta.outputs.arxiv_id }}
**Source Issue:** #${{ env.ISSUE_NUM }}

---

Generated by GitHub Actions from issue #${{ env.ISSUE_NUM }}.

*This PR auto-merges when CI passes. Merging will automatically close issue #${{ env.ISSUE_NUM }}.*            
" \
            --head "${{ env.branch }}" \
            --base main)
          echo "url=$PR_URL" >> $GITHUB_OUTPUT
          echo "PR created: $PR_URL"

      - name: Comment on issue with PR link
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment "${{ env.ISSUE_NUM }}" \
            --repo "${{ github.repository }}" \
            --body "📄 **PR 已创建！**

论文笔记已生成，请审查：
- PR: ${{ steps.pr.outputs.url }}
- Issue: #${{ env.ISSUE_NUM }}

💡 合并 PR 后此 Issue 将自动关闭。"

      - name: Auto-merge PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Wait a moment for PR to be ready
          sleep 5
          gh pr merge "${{ steps.pr.outputs.url }}" \
            --repo "${{ github.repository }}" \
            --admin \
            --auto
          echo "PR merge initiated"
